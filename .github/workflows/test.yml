name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn -B -ntp test

      - name: Build shaded jar (verifies shade plugin)
        run: mvn -B -ntp -DskipTests package

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: decline-mapper-jar
          path: target/decline-mapper.jar
          retention-days: 7
